<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Game Engine · Mission Control</title>
<style>
  :root{ --bg:#0a0f1e; --panel:#121a30; --panel2:#0e1528; --line:#26314f; --ink:#e7edff; --dim:#9fb3e0;
    --gold:#ffd34d; --green:#5fd66e; --blue:#6fb6f0; --violet:#c4a6ff; --orange:#ffb14d; --pink:#ff8ab0; --red:#ff7a7a; }
  *{ box-sizing:border-box; } body{ margin:0; background:var(--bg); color:var(--ink); line-height:1.5;
    font-family:system-ui,Segoe UI,Roboto,sans-serif; }
  a{ color:#9fd6ff; text-decoration:none; } a:hover{ text-decoration:underline; }
  header{ padding:18px 24px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:14px; flex-wrap:wrap;
    background:linear-gradient(180deg,#101a36,#0a0f1e); position:sticky; top:0; z-index:5; }
  header h1{ font-size:19px; margin:0; } header .sub{ color:var(--dim); font-size:12.5px; }
  header .sp{ flex:1; }
  button{ font:inherit; font-size:13px; background:#1b2747; color:var(--ink); border:1px solid var(--line);
    border-radius:9px; padding:7px 13px; cursor:pointer; } button:hover{ background:#23315a; }
  button.go{ background:#2a6df0; border-color:#3a7dff; } button.go:hover{ background:#3a7dff; }
  /* coherent header action pills (links + buttons look identical) */
  header .hact{ font:inherit; font-size:13px; font-weight:600; background:#1b2747; color:var(--ink); border:1px solid var(--line);
    border-radius:9px; padding:7px 13px; cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; gap:6px; line-height:1; }
  header .hact:hover{ background:#23315a; }
  header .hact.primary{ background:#2a6df0; border-color:#3a7dff; color:#fff; }
  header .hact.primary:hover{ background:#3a7dff; }
  .wrap{ max-width:1180px; margin:0 auto; padding:20px 24px 80px; }
  .totals{ display:grid; grid-template-columns:repeat(auto-fit,minmax(132px,1fr)); gap:12px; margin-bottom:22px; }
  @media (max-width:760px){ .totals{ grid-template-columns:repeat(3,1fr); } }
  /* dev pipeline */
  .pipe{ margin:11px 0 4px; }
  .pipehd{ display:flex; justify-content:space-between; font-size:10px; text-transform:uppercase; letter-spacing:.08em; color:var(--dim); margin-bottom:5px; }
  .ppct{ color:#cfe0ff; font-weight:700; }
  .pbar{ height:6px; background:#0e1730; border-radius:4px; overflow:hidden; border:1px solid var(--line); }
  .pfill{ height:100%; background:linear-gradient(90deg,#5fd66e,#6fb6f0); }
  .pchips{ display:flex; flex-wrap:wrap; gap:4px; margin-top:7px; }
  .pchip{ font-size:9.5px; padding:2px 7px; border-radius:6px; border:1px solid var(--line); color:var(--dim); background:#0e1730; cursor:default; }
  .pchip.done{ background:rgba(95,214,110,.16); border-color:rgba(95,214,110,.5); color:#9fe6aa; }
  .pchip.partial,.pchip.weak{ background:rgba(255,211,77,.14); border-color:rgba(255,211,77,.5); color:#ffe08a; }
  .pchip.todo{ opacity:.55; }
  .stat{ background:var(--panel); border:1px solid var(--line); border-radius:13px; padding:13px 15px; }
  .stat .n{ font-size:30px; font-weight:800; line-height:1; } .stat .l{ font-size:11px; color:var(--dim);
    text-transform:uppercase; letter-spacing:.1em; margin-top:5px; }
  h2{ font-size:13px; letter-spacing:.12em; text-transform:uppercase; color:var(--dim);
    border-bottom:1px solid var(--line); padding-bottom:7px; margin:28px 0 14px; }
  .cards{ display:grid; grid-template-columns:repeat(auto-fill,minmax(330px,1fr)); gap:16px; }
  .card{ background:var(--panel); border:1px solid var(--line); border-radius:15px; padding:0; position:relative; overflow:hidden;
    cursor:pointer; transition:border-color .12s, transform .12s; }
  .card:hover{ border-color:#3a7dff; transform:translateY(-3px); }
  /* visual storefront cover */
  .card .cover{ position:relative; aspect-ratio:16/9; background:linear-gradient(135deg,#16213f,#0a1124); overflow:hidden; }
  .card .cover>img{ width:100%; height:100%; object-fit:cover; display:block; transition:transform .35s ease; }
  .card:hover .cover>img{ transform:scale(1.06); }
  .card .cover .grad{ position:absolute; inset:0; background:linear-gradient(to top, rgba(8,12,22,.95) 2%, rgba(8,12,22,.35) 42%, transparent 68%); }
  .card .cover .ctitle{ position:absolute; left:15px; right:15px; bottom:11px; display:flex; align-items:flex-end; gap:9px; flex-wrap:wrap; }
  .card .cover .ctitle .nm{ font-size:22px; font-weight:900; color:#fff; text-shadow:0 2px 14px rgba(0,0,0,.95); line-height:1.05; }
  .card .cover .carch{ font-size:10px; text-transform:uppercase; letter-spacing:.09em; padding:2px 9px; border-radius:20px; background:rgba(58,125,255,.25); border:1px solid #3a7dff; color:#bcd6ff; }
  .card .cover .cdot{ position:absolute; top:11px; left:11px; width:11px; height:11px; }
  .card .cover .cbadges{ position:absolute; top:10px; right:10px; display:flex; gap:6px; }
  .card .cover .vbadge{ font-size:11px; font-weight:800; background:rgba(8,12,22,.78); border:1px solid var(--line); color:#ffd166; border-radius:20px; padding:3px 9px; }
  .card .cover .shbadge{ font-size:11px; font-weight:800; background:rgba(255,77,143,.22); border:1px solid #ff4d8f; color:#ffd6e6; border-radius:20px; padding:3px 9px; text-decoration:none; }
  .card .cover .shbadge:hover{ filter:brightness(1.2); }
  .card .cover .playov{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity .15s; }
  .card:hover .cover .playov{ opacity:1; }
  .card .cover .playov span{ width:62px; height:62px; border-radius:50%; background:rgba(8,12,22,.6); border:2px solid #fff; color:#fff; font-size:24px; display:flex; align-items:center; justify-content:center; backdrop-filter:blur(3px); }
  .card .body{ padding:12px 15px 14px; }
  .card .body .tag{ color:#c5d2ee; font-size:12.5px; margin:0 0 8px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; min-height:34px; }
  .card .body .facts{ font-size:11px; color:var(--dim); letter-spacing:.02em; margin-bottom:11px; }
  .card .cta{ display:flex; gap:8px; }
  .card .cta a{ flex:1; text-align:center; font-size:13px; font-weight:700; padding:9px 10px; border-radius:10px; border:1px solid var(--line); transition:filter .12s; }
  .card .cta a:hover{ filter:brightness(1.12); }
  /* unified button system: blue = primary action (Play), dark pill = secondary */
  .card .cta .play{ background:#2a6df0; color:#fff; border-color:#3a7dff; }
  .card .cta .det{ background:#16213f; color:#cfe0ff; }
  .card .peek{ display:none; }
  .dot{ width:9px; height:9px; border-radius:50%; flex:none; } .dot.live{ background:var(--green); box-shadow:0 0 8px var(--green); }
  .dot.idle{ background:var(--gold); } .dot.off{ background:var(--red); }
  .badge{ font-size:9.5px; text-transform:uppercase; letter-spacing:.08em; padding:2px 7px; border-radius:20px;
    border:1px solid var(--line); color:var(--dim); margin-left:auto; }
  .kv{ display:grid; grid-template-columns:auto 1fr; gap:3px 10px; font-size:12.5px; margin:4px 0 10px; }
  .kv .k{ color:var(--dim); } .kv .v{ color:#dde6ff; }
  .chips{ display:flex; flex-wrap:wrap; gap:5px; margin:6px 0 10px; }
  .chip{ font-size:10.5px; background:#0e1730; border:1px solid var(--line); border-radius:14px; padding:2px 9px; color:#cfe0ff; }
  .metrics{ display:flex; gap:8px; flex-wrap:wrap; margin:8px 0; }
  .metric{ flex:1; min-width:84px; background:var(--panel2); border:1px solid var(--line); border-radius:10px; padding:8px 10px; }
  .metric .mn{ font-size:19px; font-weight:800; } .metric .ml{ font-size:10px; color:var(--dim); text-transform:uppercase; letter-spacing:.06em; }
  .metric.notes .mn{ color:var(--orange); } .metric.uniq .mn{ color:var(--gold); } .metric.feel .mn{ color:var(--green); }
  .diaryline{ font-size:12px; color:#cdd8f5; background:var(--panel2); border-left:3px solid var(--violet);
    border-radius:8px; padding:8px 11px; margin:8px 0; } .diaryline b{ color:var(--violet); }
  .links{ display:flex; flex-wrap:wrap; gap:7px; margin-top:11px; }
  .links a{ font-size:12px; background:#16213f; border:1px solid var(--line); border-radius:8px; padding:5px 10px; }
  .feed{ display:flex; flex-direction:column; gap:9px; }
  .note{ background:var(--panel); border:1px solid var(--line); border-left:3px solid var(--orange); border-radius:11px; padding:10px 13px; }
  .note .meta{ font-size:11px; color:var(--dim); margin-top:4px; } .note .meta b{ color:#cfe0ff; }
  .note.closed{ border-left-color:var(--green); opacity:.7; }
  .muted{ color:var(--dim); font-size:13px; } code{ background:#0e1730; padding:1px 6px; border-radius:5px; font-size:12px; color:#cfe0ff; }
  dialog{ background:var(--panel); color:var(--ink); border:1px solid var(--line); border-radius:14px; padding:20px; max-width:440px; width:92%; }
  dialog input{ width:100%; font:inherit; background:#0e1730; border:1px solid var(--line); border-radius:8px; padding:8px 10px; color:var(--ink); margin:4px 0 10px; }
  dialog label{ font-size:12px; color:var(--dim); }
  .gen{ color:var(--dim); font-size:11.5px; margin-top:24px; }
  /* ── drill-in: LOOK INTO a game ── */
  dialog#detail{ max-width:960px; width:94%; padding:0; border:1px solid var(--line); max-height:92vh; overflow:auto; }
  dialog#detail::backdrop{ background:rgba(4,8,18,.66); }
  .dhead{ position:sticky; top:0; background:linear-gradient(180deg,#16213f,#121a30); border-bottom:1px solid var(--line); padding:18px 22px 14px; z-index:2; }
  .dhead .dtop{ display:flex; align-items:center; gap:10px; }
  .dhead .dnm{ font-size:22px; font-weight:800; } .dhead .dtag{ color:var(--dim); font-size:13px; margin-top:4px; }
  .dhead .x{ margin-left:auto; background:#1b2747; border:1px solid var(--line); color:var(--ink); border-radius:9px; width:32px; height:32px; cursor:pointer; font-size:15px; flex:none; }
  .darch{ font-size:9.5px; text-transform:uppercase; letter-spacing:.08em; padding:3px 9px; border-radius:20px; border:1px solid var(--line); color:#cfe0ff; background:#0e1730; }
  .dwrap{ padding:4px 22px 26px; }
  .sect{ margin-top:22px; } .sect h4{ font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--dim); margin:0 0 11px; }
  .sect h4 .cnt{ color:#cfe0ff; font-weight:700; letter-spacing:0; text-transform:none; margin-left:8px; }
  .phase{ margin-bottom:12px; } .phase .plabel{ font-size:12.5px; color:#cfe0ff; font-weight:700; margin-bottom:6px; display:flex; }
  .phase .phint{ color:var(--dim); font-weight:400; font-size:11px; margin-left:8px; flex:1; }
  .phase .pdone{ color:var(--dim); font-weight:700; }
  .vids{ display:grid; grid-template-columns:repeat(auto-fill,minmax(184px,1fr)); gap:12px; }
  .vid{ border:1px solid var(--line); border-radius:11px; overflow:hidden; background:var(--panel2); display:block; }
  .vid img{ width:100%; aspect-ratio:16/9; object-fit:cover; display:block; background:#0a1124; }
  .vid .vt{ font-size:12px; padding:7px 10px; } .vid:hover{ border-color:#3a7dff; } .vid .vt b{ color:var(--gold); }
  .vid.mont .vt b{ color:var(--violet); }
  .nlist{ display:flex; flex-direction:column; gap:8px; }
  .nrow{ background:var(--panel2); border:1px solid var(--line); border-left:3px solid var(--orange); border-radius:10px; padding:9px 12px; font-size:13px; }
  .nrow.closed{ border-left-color:var(--green); opacity:.78; }
  .nrow .nmeta{ font-size:11px; color:var(--dim); margin-top:5px; display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
  .nrow .nmeta a{ background:#16213f; border:1px solid var(--line); border-radius:6px; padding:1px 7px; }
  .scorecard{ font-size:12.5px; color:#dde6ff; line-height:1.6; } .scorecard.dgrid{ display:grid; grid-template-columns:1fr 1fr; gap:4px 16px; }
  .scorecard .sk{ color:var(--dim); } @media (max-width:680px){ .scorecard.dgrid{ grid-template-columns:1fr; } }
  /* ── Play-Store-style storefront ── */
  .hero{ position:relative; width:100%; aspect-ratio:16/9; background:#0a1124; border:1px solid var(--line); border-radius:14px; overflow:hidden; margin-top:6px; }
  .hero img{ width:100%; height:100%; object-fit:cover; display:block; }
  .hero iframe{ width:100%; height:100%; border:0; display:block; }
  .hero .play{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; cursor:pointer; background:rgba(4,8,18,.20); }
  .hero .play:hover{ background:rgba(4,8,18,.32); } .hero .play:hover{ text-decoration:none; }
  .hero .pbtn{ width:68px; height:68px; border-radius:50%; background:rgba(10,16,36,.72); border:2px solid #fff; color:#fff; display:flex; align-items:center; justify-content:center; font-size:26px; padding-left:5px; }
  .hero .play:hover .pbtn{ background:#e23; border-color:#e23; }
  .shots{ display:flex; gap:9px; overflow-x:auto; padding:11px 1px 3px; }
  .shot{ flex:0 0 auto; width:152px; border:1px solid var(--line); border-radius:9px; overflow:hidden; cursor:pointer; background:var(--panel2); }
  .shot.active{ border-color:#3a7dff; } .shot:hover{ border-color:#6fb6f0; }
  .shot img{ width:100%; aspect-ratio:16/9; object-fit:cover; display:block; }
  .shot .st{ font-size:10.5px; padding:4px 8px; color:#cfe0ff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .shotgrid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:9px; }
  .shotgrid img{ width:100%; aspect-ratio:16/9; object-fit:cover; display:block; border:1px solid var(--line); border-radius:9px; }
  .shotgrid a:hover img{ border-color:#6fb6f0; }
  .cta{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin:16px 0 2px; }
  .cta a{ font-size:14px; font-weight:700; padding:10px 18px; border-radius:10px; }
  .cta a:hover{ text-decoration:none; }
  /* same unified system in the modal: blue primary, dark-pill secondaries */
  .cta a.play{ background:#2a6df0; color:#fff; border:1px solid #3a7dff; } .cta a.play:hover{ background:#3a7dff; }
  .cta a.watch, .cta a.sec{ background:#16213f; color:var(--ink); border:1px solid var(--line); font-weight:600; }
  .cta a.watch:hover, .cta a.sec:hover{ background:#1d2c4f; }
  .about{ font-size:13.5px; color:#dde6ff; line-height:1.6; }
  .statchips{ display:flex; gap:8px; flex-wrap:wrap; margin:12px 0 2px; }
  .statchip{ background:var(--panel2); border:1px solid var(--line); border-radius:10px; padding:7px 13px; min-width:76px; }
  .statchip .sn{ font-size:18px; font-weight:800; } .statchip .sl{ font-size:10px; color:var(--dim); text-transform:uppercase; letter-spacing:.06em; }
</style>
</head>
<body>
<header>
  <h1>🎛 Game Engine</h1><span class="sub">mission control — look <b>across</b> every game, click any one to look <b>inside</b></span>
  <span class="sp"></span>
  <a href="/shorts.html" class="hact">📱 Shorts</a>
  <button class="hact" id="add">+ register game</button>
  <button class="hact primary" id="refresh">↻ refresh</button>
  <a href="https://github.com/agadabanka/game-engine" class="hact" target="_blank" rel="noopener">repo ↗</a>
</header>
<div class="wrap">
  <div class="totals" id="totals"></div>
  <h2>Games on the engine</h2>
  <div class="cards" id="cards"><p class="muted">loading…</p></div>
  <h2>Notes triage — newest across all games</h2>
  <div class="feed" id="feed"></div>
  <div class="gen" id="gen"></div>
</div>

<dialog id="dlg">
  <h3 style="margin:0 0 12px">Register a game</h3>
  <form method="dialog" id="frm">
    <label>Name</label><input name="name" required placeholder="My Game" />
    <label>GitHub repo (owner/name)</label><input name="repo" placeholder="agadabanka/my-game" />
    <label>Live URL (optional — enables note monitoring)</label><input name="url" placeholder="https://my-game.up.railway.app" />
    <label>Tagline</label><input name="tagline" placeholder="one line" />
    <div style="display:flex; gap:8px; justify-content:flex-end; margin-top:6px">
      <button value="cancel">cancel</button><button class="go" id="save" value="save">register</button>
    </div>
  </form>
</dialog>

<dialog id="detail"><div id="detailBody"></div></dialog>

<script>
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s == null ? '' : s).replace(/[&<>"]/g, (c) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]));
const ago = (t) => { if (!t) return ''; const s = (Date.now() - new Date(t)) / 1000; if (s < 60) return 'just now'; if (s < 3600) return Math.floor(s/60)+'m ago'; if (s < 86400) return Math.floor(s/3600)+'h ago'; return Math.floor(s/86400)+'d ago'; };

function statRow(t){ return `
  <div class="stat"><div class="n">${t.games}</div><div class="l">games</div></div>
  <div class="stat"><div class="n" style="color:var(--green)">${t.live}</div><div class="l">live</div></div>
  <div class="stat"><div class="n" style="color:var(--blue)">${t.avgProgress||0}%</div><div class="l">avg progress</div></div>
  <div class="stat"><div class="n">${t.levels||'—'}</div><div class="l">levels</div></div>
  <div class="stat"><div class="n" style="color:var(--pink)">${t.videos||0}</div><div class="l">videos</div></div>
  <div class="stat"><div class="n" style="color:var(--orange)">${t.openNotes}</div><div class="l">open notes</div></div>
  <div class="stat"><div class="n" style="color:var(--violet)">${t.diaryEntries}</div><div class="l">diary entries</div></div>`;
}

// storefront cover for a game: the hub's self-hosted gameplay still
// (/covers/<id>.jpg, downloaded from the game's montage) with a fallback chain
// to a committed screenshot then the youtube thumb, then a gradient if all fail.
function cardImage(g){
  if (Array.isArray(g.screenshots) && g.screenshots.length) return g.screenshots[0];
  const vs = g.videos || []; const v = vs.find((x) => x.montage) || vs[0];
  return v ? v.thumb : null;
}
function card(g){
  const m = g.meta || {};
  const status = g.live ? 'live' : (g.diary.count ? 'idle' : 'off');
  const base = g.url ? g.url.replace(/\/$/, '') : null;
  const fb = cardImage(g);                       // screenshot/youtube fallback
  const cover = `/covers/${esc(g.id)}.jpg`;      // self-hosted (preferred)
  const nVid = (g.videos || []).length;
  const arch = m.archetype ? `<span class="carch">${esc(m.archetype)}</span>` : '';
  const facts = [
    m.levelCount != null ? `${m.levelCount} levels` : null,
    nVid ? `${nVid} videos` : null,
    g.pipeline ? `${g.pipeline.pct}% built` : null,
  ].filter(Boolean).join('  ·  ');
  const onerr = fb ? `if(this.dataset.fb){this.src=this.dataset.fb;this.dataset.fb='';}else{this.remove();}` : `this.remove()`;
  const cover_img = `<img loading="lazy" src="${cover}"${fb ? ` data-fb="${esc(fb)}"` : ''} alt="${esc(g.name)}" onerror="${onerr}" />`;
  return `<div class="card" onclick="openGame('${esc(g.id)}')">
    <div class="cover">
      ${cover_img}
      <div class="grad"></div>
      <span class="cdot dot ${status}" title="${status}"></span>
      <span class="cbadges">${(g.shorts || []).length ? `<a class="shbadge" href="/shorts.html?game=${esc(g.id)}" onclick="event.stopPropagation()" title="${(g.shorts || []).length} shorts">📱 ${g.shorts.length}</a>` : ''}${nVid ? `<span class="vbadge">▶ ${nVid}</span>` : ''}</span>
      <div class="playov"><span>▶</span></div>
      <div class="ctitle"><span class="nm">${esc(g.name)}</span>${arch}</div>
    </div>
    <div class="body">
      <div class="tag">${esc(g.tagline || m.tagline || '')}</div>
      <div class="facts">${facts || 'in development'}</div>
      <div class="cta">
        ${base ? `<a class="play" href="${esc(base)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">▶ Play</a>` : ''}
        <a class="det" onclick="event.stopPropagation();openGame('${esc(g.id)}')">View details</a>
      </div>
    </div>
  </div>`;
}

let STAGE_DEFS = [], PHASE_DEFS = [], LAST = null;
function pipelineHTML(g){
  const p = g.pipeline; if (!p || !STAGE_DEFS.length) return '';
  const chips = STAGE_DEFS.map((s) => {
    const st = p.statuses[s.id] || 'todo';
    return `<span class="pchip ${st}" title="${esc(s.label)} — ${esc(s.hint)} · ${st}">${esc(s.label)}</span>`;
  }).join('');
  return `<div class="pipe">
    <div class="pipehd"><span>dev pipeline</span><span class="ppct">${p.pct}% · ${p.done}/${p.total} stages</span></div>
    <div class="pbar"><div class="pfill" style="width:${p.pct}%"></div></div>
    <div class="pchips">${chips}</div>
  </div>`;
}

function noteRow(n){
  const iss = n.issueUrl ? ` · <a href="${esc(n.issueUrl)}" target="_blank">issue #${esc(n.issueNumber)} ↗</a>` : '';
  return `<div class="note ${n.status === 'closed' ? 'closed' : ''}">
    <div>${esc(n.text)}</div>
    <div class="meta"><b>${esc(n.game)}</b> · ${esc(n.kind || 'note')}${n.level != null ? ' · L'+n.level : ''} · ${esc(n.status)} · ${ago(n.created_at)}${iss}</div>
  </div>`;
}

// ── LOOK INSIDE one game: the full make→iterate flow, its videos, its notes loop ──
function phaseBlock(g){
  const p = g.pipeline; if (!p || !STAGE_DEFS.length) return '';
  const defs = PHASE_DEFS.length ? PHASE_DEFS : [{ id: null, label: 'Pipeline', hint: '' }];
  const blocks = defs.map((ph) => {
    const stages = STAGE_DEFS.filter((s) => ph.id == null || s.phase === ph.id);
    if (!stages.length) return '';
    const done = stages.filter((s) => (p.statuses[s.id] || 'todo') === 'done').length;
    const chips = stages.map((s) => { const st = p.statuses[s.id] || 'todo';
      return `<span class="pchip ${st}" title="${esc(s.hint)} · ${st}">${esc(s.label)}</span>`; }).join('');
    return `<div class="phase"><div class="plabel">${esc(ph.label)}<span class="phint">${esc(ph.hint || '')}</span><span class="pdone">${done}/${stages.length}</span></div><div class="pchips">${chips}</div></div>`;
  }).join('');
  return `<div class="sect"><h4>Pipeline<span class="cnt">${p.pct}% · ${p.done}/${p.total} stages</span></h4>
    <div class="pbar" style="margin-bottom:13px"><div class="pfill" style="width:${p.pct}%"></div></div>${blocks}</div>`;
}
// ── storefront (Play-Store-style): a featured player + a screenshot/clip strip ──
const ytEmbed = (id) => 'https://www.youtube.com/embed/' + id + '?autoplay=1&rel=0&modestbranding=1';
window.playVideo = function (id) {
  const h = document.getElementById('hero'); if (!h) return;
  h.innerHTML = '<iframe src="' + ytEmbed(id) + '" allow="autoplay; encrypted-media; fullscreen" allowfullscreen></iframe>';
  document.querySelectorAll('.shot').forEach((s) => s.classList.toggle('active', s.dataset.id === id));
};
window.showShot = function (src) {
  const img = document.getElementById('heroImg'); if (img) img.src = src;
  document.querySelectorAll('.shot').forEach((s) => s.classList.toggle('active', s.dataset.shot === src));
};
function heroBlock(g){
  const vs = g.videos || [], shots = g.screenshots || [], base = g.url ? g.url.replace(/\/$/, '') : null;
  // 1) videos → a featured player + a clip strip (click to play inline)
  if (vs.length) {
    const feat = vs.find((v) => v.montage) || vs[0];
    const strip = vs.map((v) => `<div class="shot ${v === feat ? 'active' : ''}" data-id="${esc(v.id)}" onclick="event.stopPropagation();playVideo('${esc(v.id)}')">
      <img loading="lazy" src="${esc(v.thumb)}" alt="${esc(v.title)}" onerror="this.style.opacity=.2" />
      <div class="st">${v.montage ? '▣ ' : ''}${esc(v.title)}</div></div>`).join('');
    return `<div class="hero" id="hero">
        <img src="${esc(feat.thumb)}" alt="${esc(feat.title)}" onerror="this.style.opacity=.25" />
        <div class="play" onclick="event.stopPropagation();playVideo('${esc(feat.id)}')"><span class="pbtn">▶</span></div>
      </div>
      <div class="shots">${strip}</div>`;
  }
  // 2) screenshots → a featured image + a screenshot strip (click to swap)
  if (shots.length) {
    const strip = shots.map((s, i) => `<div class="shot ${i === 0 ? 'active' : ''}" data-shot="${esc(s)}" onclick="event.stopPropagation();showShot('${esc(s)}')">
      <img loading="lazy" src="${esc(s)}" alt="screenshot" /></div>`).join('');
    return `<div class="hero"><img id="heroImg" src="${esc(shots[0])}" alt="screenshot" /></div>
      <div class="shots">${strip}</div>`;
  }
  // 3) nothing yet → a Play panel
  return `<div class="hero" style="display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#16213f,#0a1124)">
      ${base ? `<a class="play" href="${esc(base)}" target="_blank" rel="noopener" onclick="event.stopPropagation()"><span class="pbtn">▶</span></a>` : '<span class="muted">no preview yet</span>'}</div>`;
}
function ctaBlock(g){
  const base = g.url ? g.url.replace(/\/$/, '') : null, m = g.meta || {}, a = [];
  if (base) a.push(`<a class="play" href="${esc(base)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">▶ Play</a>`);
  if (g.playlist) a.push(`<a class="watch" href="${esc(g.playlist)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">▶ ${g.hasPlaylist ? 'Watch all on YouTube' : 'Watch the montage'}</a>`);
  if ((g.shorts || []).length) a.push(`<a class="sec" href="${esc(g.shortsPlaylist || ('/shorts.html?game=' + g.id))}" ${g.shortsPlaylist ? 'target="_blank" rel="noopener"' : ''} onclick="event.stopPropagation()">📱 Shorts (${g.shorts.length})</a>`);
  if (base) a.push(`<a class="sec" href="${esc(base + (m.builder || '/build.html'))}" target="_blank" rel="noopener" onclick="event.stopPropagation()">🧱 Builder</a>`);
  if (base) a.push(`<a class="sec" href="${esc(base + '/diary.html')}" target="_blank" rel="noopener" onclick="event.stopPropagation()">📖 Diary</a>`);
  if (g.repo) a.push(`<a class="sec" href="https://github.com/${esc(g.repo)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">🐙 Repo</a>`);
  if (g.issues && g.issues.url) a.push(`<a class="sec" href="${esc(g.issues.url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">🐛 Issues</a>`);
  return `<div class="cta">${a.join('')}</div>`;
}
function aboutBlock(g){
  const m = g.meta || {};
  const kv = [['verb', m.verb || g.verb], m.controls ? ['controls', m.controls] : null, m.art ? ['art', m.art] : null, m.music ? ['music', m.music] : null, ['hero', m.hero || g.hero]]
    .filter(Boolean).filter(([, v]) => v).map(([k, v]) => `<div class="k">${k}</div><div class="v">${esc(v)}</div>`).join('');
  const chips = [
    m.levelCount != null ? ['levels', m.levelCount] : null,
    (g.videos || []).length ? ['videos', g.videos.length] : null,
    ['progress', (g.pipeline ? g.pipeline.pct : 0) + '%'],
    g.issues ? ['notes fixed', g.issues.closed] : null,
  ].filter(Boolean).map(([l, n]) => `<div class="statchip"><div class="sn">${esc(n)}</div><div class="sl">${esc(l)}</div></div>`).join('');
  return `<div class="sect"><h4>About this game</h4>
    <div class="about">${esc(g.tagline || m.tagline || '')}</div>
    ${kv ? `<div class="kv" style="margin-top:10px">${kv}</div>` : ''}
    <div class="statchips">${chips}</div></div>`;
}
function notesLoop(g){
  const iss = g.issues || { open: 0, closed: 0 };
  const head = `<span class="cnt">${iss.open} open · ${iss.closed} fixed${iss.url ? ` · <a href="${esc(iss.url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">all issues ↗</a>` : ''}</span>`;
  const rows = (g.notes.recent || []).map((n) => `<div class="nrow ${n.status === 'closed' ? 'closed' : ''}">
    <div>${esc(n.text)}</div>
    <div class="nmeta">${esc(n.kind || 'note')}${n.level != null ? ' · L' + n.level : ''} · ${esc(n.status)} · ${ago(n.created_at)}
      ${n.issueUrl ? `<a href="${esc(n.issueUrl)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">issue #${esc(n.issueNumber)} ↗</a>` : ''}</div>
  </div>`).join('');
  return `<div class="sect"><h4>📝 Notes → issues → fixes${head}</h4>
    ${rows ? `<div class="nlist">${rows}</div>` : '<p class="muted">No playtest notes yet — in the live game, ⏸ Pause → 📝 drops a note that files a GitHub issue automatically.</p>'}</div>`;
}
function shotsBlock(g){
  const shots = g.screenshots || []; if (!shots.length) return '';
  const cells = shots.map((s) => `<a href="${esc(s)}" target="_blank" rel="noopener" onclick="event.stopPropagation()"><img loading="lazy" src="${esc(s)}" alt="screenshot" onerror="this.closest('a').style.display='none'" /></a>`).join('');
  return `<div class="sect"><h4>🖼 Screenshots<span class="cnt">${shots.length}</span></h4><div class="shotgrid">${cells}</div></div>`;
}
function diaryBlock(g){
  const es = (g.diary && g.diary.entries) || []; if (!es.length) return '';
  const rows = es.map((e) => `<div class="diaryline"><b>${esc(e.title)}</b>${e.bullets ? ` · ${e.bullets} notes` : ''}</div>`).join('');
  const base = g.url ? g.url.replace(/\/$/, '') : null;
  const more = base ? ` <a href="${esc(base + '/diary.html')}" target="_blank" rel="noopener" onclick="event.stopPropagation()">read full diary ↗</a>` : '';
  return `<div class="sect"><h4>📔 Build diary<span class="cnt">${g.diary.count} entries${more}</span></h4>${rows}</div>`;
}
function scoreBlock(g){
  const m = g.meta || {}, out = [];
  if (m.designLens && !/^\//.test(m.designLens)) out.push(`<div class="sect"><h4>🎯 Design lens</h4><div class="scorecard">${esc(m.designLens)}</div></div>`);
  const sc = m.scorecard;
  if (sc && typeof sc === 'object') {
    const items = Object.entries(sc).map(([k, v]) => `<div><span class="sk">${esc(k)}</span> ${esc(typeof v === 'object' ? JSON.stringify(v) : v)}</div>`).join('');
    out.push(`<div class="sect"><h4>📊 Scorecard</h4><div class="scorecard dgrid">${items}</div></div>`);
  }
  return out.join('');
}
function detailHTML(g){
  const m = g.meta || {};
  const status = g.live ? 'live' : (g.diary.count ? 'idle' : 'off');
  const arch = m.archetype ? `<span class="darch">${esc(m.archetype)}</span>` : '';
  return `<div class="dhead">
      <div class="dtop"><span class="dot ${status}"></span><span class="dnm">${esc(g.name)}</span>${arch}
        <button class="x" title="close" onclick="document.getElementById('detail').close()">✕</button></div>
      <div class="dtag">${esc(g.tagline || m.tagline || '')}</div>
    </div>
    <div class="dwrap store">
      ${heroBlock(g)}
      ${ctaBlock(g)}
      ${aboutBlock(g)}
      ${shotsBlock(g)}
      ${phaseBlock(g)}
      ${notesLoop(g)}
      ${diaryBlock(g)}
      ${scoreBlock(g)}
    </div>`;
}
function openGame(id){
  const g = (LAST && LAST.games || []).find((x) => x.id === id); if (!g) return;
  $('detailBody').innerHTML = detailHTML(g);
  const d = $('detail'); d.showModal(); d.scrollTop = 0;
}
window.openGame = openGame;

async function load(force){
  $('cards').innerHTML = '<p class="muted">loading…</p>';
  const d = await fetch('/api/dashboard' + (force ? '?force=1' : '')).then((r) => r.json()).catch(() => null);
  if (!d) { $('cards').innerHTML = '<p class="muted">could not load dashboard.</p>'; return; }
  LAST = d; STAGE_DEFS = d.stages || []; PHASE_DEFS = d.phases || [];
  $('totals').innerHTML = statRow(d.totals);
  $('cards').innerHTML = d.games.length ? d.games.map(card).join('') : '<p class="muted">no games registered yet.</p>';
  $('feed').innerHTML = d.notesFeed.length ? d.notesFeed.map(noteRow).join('')
    : '<p class="muted">no notes yet — leave one in any game via ⏸ Pause → 📝, or set a game\'s live URL to start monitoring.</p>';
  $('gen').textContent = 'updated ' + new Date(d.generated).toLocaleString() + ' · pulls each game\'s /api/notes + /api/diary + /api/meta';
}

$('refresh').onclick = () => load(true);
$('add').onclick = () => $('dlg').showModal();
// click the backdrop (outside the inner content) to close the drill-in
$('detail').addEventListener('click', (e) => { if (e.target.id === 'detail') e.target.close(); });
$('frm').addEventListener('submit', async (e) => {
  if (e.submitter && e.submitter.value !== 'save') return;
  const f = new FormData($('frm'));
  const body = Object.fromEntries([...f.entries()].filter(([, v]) => v));
  await fetch('/api/games', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
  setTimeout(() => load(true), 400);
});
load();
setInterval(() => load(false), 90_000);
</script>
</body>
</html>
