<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Shorts — Game Engine</title>
<style>
  :root { --bg:#06070d; --line:#243049; --ink:#eef3ff; --dim:#9fb3e0; --accent:#ffd166; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; background:var(--bg); color:var(--ink); font-family:system-ui,Segoe UI,Roboto,sans-serif; }
  .bar{ position:fixed; top:0; left:0; right:0; height:54px; display:flex; align-items:center; gap:14px; padding:0 18px; z-index:10;
    background:linear-gradient(180deg,rgba(6,7,13,.95),rgba(6,7,13,0)); }
  .bar a{ color:#9fd6ff; text-decoration:none; font-size:14px; }
  .bar h1{ font-size:16px; margin:0; font-weight:800; letter-spacing:.02em; }
  .bar .hint{ margin-left:auto; color:var(--dim); font-size:12px; }
  .feed{ height:100%; overflow-y:scroll; scroll-snap-type:y mandatory; scroll-behavior:smooth; }
  .snap{ height:100%; scroll-snap-align:start; display:flex; align-items:center; justify-content:center; position:relative; }
  .player{ position:relative; height:88vh; aspect-ratio:9/16; max-width:96vw; border-radius:18px; overflow:hidden;
    border:1px solid var(--line); box-shadow:0 24px 80px rgba(0,0,0,.6); background:#000; }
  .player iframe{ width:100%; height:100%; border:0; display:block; }
  .label{ position:absolute; left:50%; bottom:18px; transform:translateX(-50%); display:flex; gap:10px; align-items:center;
    background:rgba(6,9,18,.66); border:1px solid var(--line); border-radius:30px; padding:7px 16px; backdrop-filter:blur(6px); pointer-events:none; }
  .label .g{ font-weight:800; font-size:14px; } .label .b{ color:var(--accent); font-size:13px; font-weight:700; }
  .nav{ position:absolute; right:18px; top:50%; transform:translateY(-50%); display:flex; flex-direction:column; gap:10px; z-index:9; }
  .nav button{ width:46px; height:46px; border-radius:50%; border:1px solid var(--line); background:rgba(14,20,36,.8); color:#fff; font-size:20px; cursor:pointer; }
  .nav button:hover{ border-color:#6fb6f0; }
  .empty{ height:100%; display:flex; align-items:center; justify-content:center; color:var(--dim); }
  .scrollhint{ position:fixed; left:50%; bottom:16px; transform:translateX(-50%); color:var(--dim); font-size:12px; z-index:8; animation:bob 1.4s infinite; }
  @keyframes bob{ 0%,100%{ transform:translate(-50%,0);} 50%{ transform:translate(-50%,6px);} }
</style>
</head>
<body>
<div class="bar">
  <a href="/">← engine</a>
  <h1 id="title">📱 Shorts</h1>
  <span class="hint">scroll ↓ or use ↑↓ / J K</span>
</div>
<div id="feed" class="feed"><div class="empty">loading shorts…</div></div>
<div class="nav"><button id="up" title="previous (K)">↑</button><button id="down" title="next (J)">↓</button></div>
<div class="scrollhint" id="scrollhint">scroll to play the next ↓</div>
<script>
  const esc = s => String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const qs = new URLSearchParams(location.search);
  const only = qs.get('game');
  const embed = id => `https://www.youtube.com/embed/${id}?playsinline=1&rel=0&modestbranding=1&loop=1&playlist=${id}`;
  fetch('/api/dashboard').then(r=>r.json()).then(d=>{
    let items = [];
    (d.games||[]).forEach(g=>{
      if (only && g.id !== only) return;
      (g.shorts||[]).forEach(s => items.push({ id:s.id, game:g.name, gameId:g.id, title:s.title, biome:s.biome }));
    });
    const feed = document.getElementById('feed');
    if (!items.length){ feed.innerHTML = '<div class="empty">No shorts yet.</div>'; document.getElementById('scrollhint').style.display='none'; return; }
    if (only && items[0]) document.getElementById('title').innerHTML = '📱 ' + esc(items[0].game) + ' — Shorts';
    feed.innerHTML = items.map((s,i)=>`<section class="snap" data-i="${i}">
        <div class="player">
          <iframe loading="lazy" src="${i===0?embed(s.id):''}" data-src="${embed(s.id)}" allow="autoplay; encrypted-media; fullscreen" allowfullscreen></iframe>
          <div class="label"><span class="g">${esc(s.game)}</span><span class="b">${esc(s.biome)}</span></div>
        </div>
      </section>`).join('');
    // lazy-load each iframe as it scrolls into view (and pause others by clearing src)
    const secs = [...feed.querySelectorAll('.snap')];
    const io = new IntersectionObserver((ents)=>{
      ents.forEach(e=>{
        const f = e.target.querySelector('iframe');
        if (e.isIntersecting){ if(!f.src) f.src = f.dataset.src; }
        else if (f.src){ f.src=''; }    // unload offscreen so only the visible short plays
      });
    }, { threshold: 0.6 });
    secs.forEach(s=>io.observe(s));
    // keyboard / button nav
    let cur = 0;
    const go = (d)=>{ cur = Math.max(0, Math.min(secs.length-1, cur+d)); secs[cur].scrollIntoView({behavior:'smooth'}); };
    document.getElementById('down').onclick=()=>go(1);
    document.getElementById('up').onclick=()=>go(-1);
    addEventListener('keydown',e=>{ if(e.key==='ArrowDown'||e.key==='j'){e.preventDefault();go(1);} if(e.key==='ArrowUp'||e.key==='k'){e.preventDefault();go(-1);} });
    feed.addEventListener('scroll',()=>{ cur = Math.round(feed.scrollTop / feed.clientHeight); document.getElementById('scrollhint').style.opacity = feed.scrollTop>40?'0':'1'; });
  }).catch(()=>{ document.getElementById('feed').innerHTML='<div class="empty">could not load shorts</div>'; });
</script>
</body>
</html>
