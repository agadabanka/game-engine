<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Shorts — Game Engine</title>
<style>
  :root { --bg:#06070d; --line:#243049; --ink:#eef3ff; --dim:#9fb3e0; --accent:#ffd166;
    --sat:env(safe-area-inset-top,0px); --sab:env(safe-area-inset-bottom,0px); }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; height:100%; background:var(--bg); color:var(--ink); font-family:system-ui,Segoe UI,Roboto,sans-serif; overscroll-behavior:none; }
  .bar{ position:fixed; top:0; left:0; right:0; z-index:20; display:flex; align-items:center; gap:12px;
    padding:calc(var(--sat) + 10px) 16px 12px; background:linear-gradient(180deg,rgba(6,7,13,.92),rgba(6,7,13,0)); pointer-events:none; }
  .bar>*{ pointer-events:auto; }
  .bar a.back{ color:#cfe0ff; text-decoration:none; font-size:14px; font-weight:700; background:rgba(20,28,46,.7); border:1px solid var(--line); border-radius:20px; padding:7px 13px; }
  .bar h1{ font-size:15px; margin:0; font-weight:800; text-shadow:0 2px 8px #000; }
  .bar .mute{ margin-left:auto; background:rgba(20,28,46,.7); border:1px solid var(--line); color:#fff; border-radius:20px; padding:7px 13px; font-size:13px; font-weight:700; cursor:pointer; }
  .feed{ height:100dvh; overflow-y:scroll; scroll-snap-type:y mandatory; -webkit-overflow-scrolling:touch; }
  .snap{ height:100dvh; scroll-snap-align:start; scroll-snap-stop:always; display:flex; align-items:center; justify-content:center; position:relative; }
  .player{ position:relative; height:min(100dvh, calc(96vw * 16/9)); aspect-ratio:9/16; max-width:96vw;
    border-radius:16px; overflow:hidden; background:#0b0e16; box-shadow:0 18px 60px rgba(0,0,0,.55); }
  .player video{ width:100%; height:100%; object-fit:cover; display:block; background:#0b0e16; }
  .player .tap{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; }
  .player .tap .pbtn{ width:72px; height:72px; border-radius:50%; background:rgba(6,9,18,.5); border:2px solid #fff; color:#fff; font-size:28px; display:flex; align-items:center; justify-content:center; backdrop-filter:blur(3px); opacity:0; transition:opacity .15s; }
  .player.paused .tap .pbtn{ opacity:1; }
  .player .spin{ position:absolute; inset:0; display:none; align-items:center; justify-content:center; color:#7e8db0; font-size:13px; }
  .player.loading .spin{ display:flex; }
  .label{ position:absolute; left:14px; right:14px; bottom:14px; display:flex; gap:9px; align-items:center; flex-wrap:wrap; pointer-events:none;
    background:linear-gradient(0deg,rgba(6,9,18,.72),transparent); padding:26px 6px 6px; }
  .label .g{ font-weight:800; font-size:16px; text-shadow:0 2px 8px #000; } .label .b{ color:var(--accent); font-size:13px; font-weight:700; }
  .label .playbtn{ pointer-events:auto; margin-left:auto; background:var(--accent); color:#0a0f1c; font-weight:900; text-decoration:none;
    padding:9px 18px; border-radius:24px; font-size:14px; box-shadow:0 4px 16px rgba(0,0,0,.4); white-space:nowrap; }
  .label .playbtn:active{ filter:brightness(.92); }
  .nav{ position:fixed; right:14px; bottom:calc(var(--sab) + 22px); display:flex; flex-direction:column; gap:12px; z-index:15; }
  .nav button{ width:48px; height:48px; border-radius:50%; border:1px solid var(--line); background:rgba(14,20,36,.85); color:#fff; font-size:21px; cursor:pointer; }
  .count{ position:fixed; left:50%; bottom:calc(var(--sab) + 12px); transform:translateX(-50%); z-index:15; color:var(--dim); font-size:12px; background:rgba(6,9,18,.6); padding:4px 12px; border-radius:20px; }
  .empty{ height:100dvh; display:flex; align-items:center; justify-content:center; color:var(--dim); }
</style>
</head>
<body>
<div class="bar">
  <a class="back" href="/">← engine</a>
  <h1 id="title">📱 Shorts</h1>
  <button class="mute" id="mute">🔇 Tap for sound</button>
</div>
<div id="feed" class="feed"><div class="empty">loading shorts…</div></div>
<div class="nav"><button id="up" aria-label="previous">↑</button><button id="down" aria-label="next">↓</button></div>
<div class="count" id="count"></div>
<script>
  const esc = s => String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const only = new URLSearchParams(location.search).get('game');
  // same-origin proxy so GitHub-hosted mp4 play + seek reliably everywhere
  const proxy = u => '/v?src=' + encodeURIComponent(u);
  let items = [], secs = [], cur = 0, audioOn = false;
  const vid = i => document.getElementById('v'+i);
  const pl = i => document.getElementById('pl'+i);

  fetch('/api/dashboard').then(r=>r.json()).then(d=>{
    // interleave shorts across games (round-robin) so consecutive shorts are
    // from DIFFERENT games — variety instead of all-of-one-game-then-the-next.
    const lists = (d.games||[]).filter(g=>!only||g.id===only)
      .map(g=>(g.shorts||[]).filter(s=>s.mp4).map(s=>({ mp4:s.mp4, yt:s.yt||s.id, game:g.name, url:g.url, title:s.title, biome:s.biome })));
    let more=true; while(more){ more=false; for(const L of lists){ const s=L.shift(); if(s){ items.push(s); more=true; } } }
    const feed = document.getElementById('feed');
    if (!items.length){ feed.innerHTML='<div class="empty">No shorts yet.</div>'; return; }
    if (only && items[0]) document.getElementById('title').textContent = '📱 ' + items[0].game + ' — Shorts';
    feed.innerHTML = items.map((s,i)=>`<section class="snap" data-i="${i}">
        <div class="player paused loading" id="pl${i}">
          <video id="v${i}" loop playsinline preload="none" data-src="${esc(s.mp4)}"></video>
          <div class="spin">loading…</div>
          <div class="tap"><div class="pbtn">▶</div></div>
          <div class="label"><span class="g">${esc(s.game)}</span><span class="b">${esc(s.biome)}</span>${s.url?`<a class="playbtn" href="${esc(s.url)}" target="_blank" rel="noopener">▶ Play</a>`:''}</div>
        </div>
      </section>`).join('');
    secs = [...feed.querySelectorAll('.snap')];
    document.getElementById('count').textContent = `1 / ${items.length}`;

    // iOS ignores <video preload> AND caps how many elements can hold a decoder at
    // once, so a big preload window doesn't buffer ahead — it just starves later
    // shorts of a decoder (stuck on "loading…" until tapped). Keep a TIGHT window.
    const AHEAD = 2;          // keep cur-1 .. cur+2 loaded (4 elements); unload the rest
    function clearLoading(i){ const p=pl(i); if (p) p.classList.remove('loading'); }
    function load(i){ const v=vid(i); if(v && !v.src && v.dataset.src){ v.preload='auto'; v.src = proxy(v.dataset.src);
      // clear the spinner on ANY ready/began signal (iOS is stingy about 'loadeddata');
      // 'error' clears it too so a short never hangs on the loading frame forever.
      ['loadedmetadata','loadeddata','canplay','playing','error'].forEach(ev=>v.addEventListener(ev, ()=>clearLoading(i), {once:true})); } }
    function unload(i){ const v=vid(i); if(v && v.src){ v.removeAttribute('src'); v.load(); pl(i).classList.add('loading'); } }
    let playGen = 0;            // bumped on each play/pause so stale retries cancel themselves
    let pausedByUser = false;   // the user explicitly paused the CURRENT short → don't auto-resume it
    // Get short i ROLLING. Try WITH sound (if enabled); if the browser rejects unmuted
    // autoplay — iOS, once its tap-activation lapses — fall back to MUTED, which is
    // always allowed, so the frame never hangs. A tap then lifts the mute.
    function kick(i){ const v=vid(i); if(!v) return; load(i);
      const gen = ++playGen; let tries = 0;
      // Start MUTED — muted playback is ALWAYS allowed (no autoplay block, never a stuck
      // frame). Once it's actually rolling, lift the mute if the user wants sound:
      // unmuting an already-PLAYING element is honored on iOS after the first tap, which
      // is far more reliable than attempting unmuted autoplay (frequently blocked → the
      // "needs a tap" cases). A scroll-gesture syncMute() re-asserts it as a backstop.
      const start = ()=>{
        if (cur !== i || gen !== playGen) return;             // scrolled away or superseded
        v.muted = true;
        const p = v.play();
        if (p && p.then) p.then(()=>{ if (cur===i && gen===playGen && audioOn) v.muted = false; })
                          .catch(()=>{ if (cur===i && gen===playGen && ++tries<=8) setTimeout(start, 300); });
      };
      start();
    }
    function play(i){ pausedByUser = false; kick(i); pl(i).classList.remove('paused'); }
    function pause(i){ playGen++; const v=vid(i); if(v){ v.pause(); pl(i).classList.add('paused'); } }
    // WATCHDOG — the automatic version of "tap and it starts". A short can sit on the
    // loading frame when iOS quietly drops a play() (decoder/activation contention) or a
    // proxy fetch stalls. So we poll the CURRENT short: if the user hasn't paused it and
    // it isn't advancing, re-kick it; if it has NO data at all after a beat, hard-reload
    // to restart the fetch. This is what makes the feed self-heal without a tap.
    let lastT = -1, wedged = 0, lastCur = -1;
    setInterval(()=>{
      if (document.hidden) return;
      const v = vid(cur); if (!v) return;
      if (cur !== lastCur) { lastCur = cur; lastT = -1; wedged = 0; }    // moved to a new short → reset
      if (pausedByUser) { lastT = v.currentTime; return; }
      if (!v.src) { load(cur); }
      const advancing = v.currentTime > lastT + 0.05;
      if (!v.paused && advancing) { wedged = 0; }
      else {
        wedged++;
        if (wedged >= 5 && v.readyState === 0) { unload(cur); load(cur); wedged = 0; }  // fetch dead → restart it
        kick(cur);
      }
      lastT = v.currentTime;
    }, 700);
    // single source of truth for audio. Browsers block autoplay-WITH-sound until a
    // gesture, so we start muted and flip ON at the first interaction. Turning sound
    // on (re)plays the CURRENT short with audio through the robust play() path.
    let armedAt = 0;     // time of the gesture that first enabled sound
    function setAudio(on){ audioOn = on;
      document.querySelectorAll('video').forEach(v=>{ if (v.src) v.muted = !on; });
      document.getElementById('mute').textContent = on ? '🔊 Sound on' : '🔇 Tap for sound';
      if (on) play(cur);
    }
    function armAudio(){ if (!audioOn) { setAudio(true); armedAt = Date.now(); } }
    // tap a player: the FIRST tap only ENABLES sound — it must NOT also pause. (The
    // glitch: pointerdown armed audio, then this click immediately paused it, so the
    // first short went silent.) Subsequent taps toggle play/pause.
    secs.forEach((sec,i)=>{ pl(i).addEventListener('click', ()=>{
      if (!audioOn) { armAudio(); return; }
      if (Date.now() - armedAt < 500) return;   // the click that just enabled sound → don't pause
      const v=vid(i); if(!v) return;
      if (v.paused) { play(i); }                // resume
      else if (v.muted) { v.muted = false; }    // playing but muted (iOS blocked auto-unmute) → this tap lifts it
      else { pausedByUser = true; pause(i); }   // playing with sound → user pause (watchdog leaves it alone)
    }); });
    // play the most-visible short, pause others, preload neighbours
    const io = new IntersectionObserver(ents=>{
      ents.forEach(e=>{ const i=+e.target.dataset.i;
        if (e.isIntersecting && e.intersectionRatio>0.6){
          cur=i; document.getElementById('count').textContent = `${i+1} / ${items.length}`;
          // Free decoders FIRST (unload outside the tight keep-window) so the current
          // short can always claim one on iOS, THEN (re)load the window and play.
          secs.forEach((_,j)=>{ if (j < i-1 || j > i+AHEAD) unload(j); else if (j !== i) pause(j); });
          for (let k=-1; k<=AHEAD; k++) load(i+k);
          play(i);
        }
      });
    }, { threshold:[0,0.6,1] });
    secs.forEach(s=>io.observe(s));
    // A scroll is a touch gesture (fresh autoplay activation on iOS), so kick the
    // current short the moment scrolling settles — landing the play() inside the
    // gesture window gives it a chance to start WITH sound instead of falling to muted.
    let scrollT = null;
    feed.addEventListener('scroll', ()=>{ syncMute(); clearTimeout(scrollT); scrollT = setTimeout(()=>{ if (!pausedByUser) kick(cur); }, 120); }, {passive:true});

    // iOS only honors an UNMUTE performed INSIDE a user gesture. So on every touch —
    // including the start of a scroll-swipe — re-assert unmute on all loaded shorts.
    // That "pre-unlocks" the short you're swiping toward, so it starts WITH sound
    // instead of needing its own tap. The first gesture still just enables sound.
    function syncMute(){ if(!audioOn) return; document.querySelectorAll('video').forEach(v=>{ if(v.src) v.muted=false; }); }
    const onGesture = e=>{ if(e.target && e.target.closest && e.target.closest('#mute')) return;
      if(!audioOn){ armAudio(); } else { syncMute(); } };
    document.addEventListener('pointerdown', onGesture, {passive:true});
    document.addEventListener('touchstart', onGesture, {passive:true});

    const go = d=>{ cur=Math.max(0,Math.min(secs.length-1,cur+d)); secs[cur].scrollIntoView({behavior:'smooth'}); };
    document.getElementById('down').onclick=()=>go(1);
    document.getElementById('up').onclick=()=>go(-1);
    document.getElementById('mute').onclick=(e)=>{ e.stopPropagation(); setAudio(!audioOn); };
    addEventListener('keydown',e=>{ if(e.key==='ArrowDown'||e.key==='j'){e.preventDefault();go(1);} if(e.key==='ArrowUp'||e.key==='k'){e.preventDefault();go(-1);} if(e.key==='m'){document.getElementById('mute').click();} });
    // start the first one + buffer the opening window (muted autoplay; first gesture turns sound on)
    setTimeout(()=>{ for(let k=0;k<=AHEAD;k++) load(k); play(0); }, 150);
  }).catch(()=>{ document.getElementById('feed').innerHTML='<div class="empty">could not load shorts</div>'; });
</script>
</body>
</html>
